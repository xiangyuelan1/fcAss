version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: a_stock_backend
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_models:/app/models
      - backend_logs:/app/logs
      - backend_db:/app/db
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:///./db/a_stock_trainer.db
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-in-production}
      - MODEL_DIR=/app/models
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: a_stock_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  backend_models:
  backend_logs:
  backend_db:
